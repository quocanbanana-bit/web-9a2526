c càng nhiều, trải nghiệm của bạn sẽ càng được cá nhân hóa. Bạn luôn có thể điều chỉnh đề xuất bằng tính năng {s_keywordLink}.","filterKeywordsWeb_fypEntry_manageFeeds_popup":"Lọc từ khóa","filterKeywordsWeb_fypEntry_modal_desc2":"Bạn cũng có thể tắt bảng tin cá nhân hóa bất cứ lúc nào. Việc này sẽ làm thay đổi một số trải nghiệm của bạn, bao gồm việc đổi bảng tin Đề xuất thành Thịnh hành, nhưng sẽ không ảnh hưởng đến tính năng cá nhân hóa quảng cáo. {s_learnLink}","nonpersonalizedFeeds_turnOn_modal_toggle_bodyFull":"Nội dung bạn nhìn thấy trên TikTok phản ánh hoạt động tương tác của bạn. Bạn tương tác càng nhiều thì bảng tin sẽ càng phù hợp với bạn.\n\nBạn có thể bật bảng tin cá nhân hóa bất cứ lúc nào. Việc này sẽ làm thay đổi một số trải nghiệm của bạn, bao gồm việc đổi bảng tin Thịnh hành thành Đề xuất, nhưng sẽ không ảnh hưởng đến tính năng cá nhân hóa quảng cáo. Bạn có thể tắt bảng tin cá nhân hóa bất cứ lúc nào để đảo ngược những thay đổi này.","personalisedSearch_searchResults_actionSheet_bodyPara1":"Hoạt động tương tác của bạn trên TikTok giúp định hình nội dung bạn nhìn thấy. Bạn tương tác càng nhiều thì trải nghiệm tìm kiếm sẽ càng phù hợp với bạn.\n\nBạn có thể tắt tính năng tìm kiếm cá nhân hóa bất cứ lúc nào. Việc này sẽ làm thay đổi một số trải nghiệm của bạn, bao gồm truy vấn tìm kiếm được đề xuất, cũng như cách xếp hạng của kết quả tìm kiếm. Tuy nhiên, việc này sẽ không ảnh hưởng đến tính năng cá nhân hóa quảng cáo. Bạn có thể bật lại tính năng tìm kiếm cá nhân hóa bất cứ lúc nào để đảo ngược những thay đổi này.","personalisedSearch_searchResults_actionSheet_bodyPara1V2":"Hoạt động tương tác của bạn trên TikTok giúp định hình nội dung bạn nhìn thấy. Bạn tương tác càng nhiều thì trải nghiệm tìm kiếm sẽ càng phù hợp với bạn.\n\nBạn có thể bật tính năng tìm kiếm cá nhân hóa bất cứ lúc nào. Việc này sẽ làm thay đổi một số trải nghiệm của bạn, bao gồm truy vấn tìm kiếm được đề xuất, cũng như cách xếp hạng của kết quả tìm kiếm. Tuy nhiên, việc này sẽ khôn  video đơn giản chỉ được nhập hoặc tải lên từ các nguồn khác (như nền tảng khác, chương trình truyền hình, phim ảnh hoặc webcast) mà không có sửa mới, sáng tạo. Video được xác định không phải nguyên tác nếu có hình mờ hoặc logo trên đó. Nội dung chất lượng thấp bao gồm các video rất ngắn, ảnh tĩnh và video chỉ được tạo từ ảnh GIF. Nội dung có chứa mã QR thường sẽ không đủ điều kiện để xuất hiện trên bảng tin Cho bạn do có thể đưa người dùng đến các trang web hoặc ứng dụng có hại, mặc dù chúng tôi có đề ra những trường hợp ngoại lệ vì có rủi ro thấp (ví dụ: vì mục đích thương mại điện tử).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Nội dung không phải là nguyên tác, có chất lượng thấp và chứa mã QR","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Để duy trì trải nghiệm tích cực cho người dùng trên nền tảng TikTok, nội dung không phải nguyên tác và có chất lượng thấp sẽ không đủ điều kiện để được đề xuất. Nội dung không phải nguyên tác là nội dung đơn giản chỉ được nhập hoặc sao chép từ các nguồn khác mà không có sửa mới, sáng tạo. Video được xác định không phải nguyên tác nếu có hình mờ hoặc logo trên đó. Nội dung chất lượng thấp bao gồm các video rất ngắn, ảnh tĩnh và video chỉ được tạo từ ảnh GIF.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Tài khoản bị sao chép","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Tài khoản của bạn có các bài đăng không phải là nguyên tác và không đủ điều kiện xuất hiện trên bảng tin Cho bạn. Để biết thêm thông tin, hãy xem lại Nguyên tắc Cộng đồng \u003E Không phù hợp để xuất hiện trên bảng tin Cho bạn \u003E Nội dung không phải là nguyên tác, có chất lượng thấp và chứa mã QR","vid_mod_analytics_penalty_reason_spam_title":"Nội dung rác, không đúng sự thật hoặc gây hiểu lầm","vid_mod_analytics_penalty_reason_spam_desc":"Nội dung tìm cách đánh lừa hoặc thao túng người dùng để tăng lượng follower, lượt thích hoặc lượt xem hay chỉ số tương tác khác trên nền tảng sẽ không đủ điều kiện để xuất hiện trên bảng tin Cho bạn. Trong đó bao gồm nội dung khuyến khích người dùng follow hoặc thích nhau, hoặc nội dung lừa người dùng nhấp vào nút thích hoặc chia sẻ. Ngoài ra, nội dung khuyến khích thuyết âm mưu và lan truyền thông tin sai lệch hoặc gây hại về các sự kiện hiện tại cũng như sự kiện có thông tin chi tiết vẫn đang được phát triển cũng sẽ không đủ điều kiện để xuất hiện trên bảng tin Cho bạn.","vid_mod_analytics_penalty_reason_sexual_title":"Nội dung khiêu dâm","vid_mod_analytics_penalty_reason_sexual_desc":"Nhằm giúp duy trì trải nghiệm thoải mái, nội dung khiêu gợi tình dục có thể sẽ không đủ điều kiện để được đề xuất, bao gồm nội dung ngụ ý khỏa thân, tính dục hóa bộ phận cơ thể hoặc khiêu dâm hay trụy lạc rõ ràng (cụ thể là múa thoát y).","vid_mod_analytics_penalty_reason_tobacco_title":"Sản phẩm thuốc lá và rượu bia","vid_mod_analytics_penalty_reason_tobacco_desc":"Nội dung quảng bá, nhắc đến hoặc mô tả sản phẩm có cồn do người đủ độ tuổi theo luật pháp sử dụng nhưng theo cách nguy hiểm có thể sẽ không đủ điều kiện để được đề xuất. Nội dung mô tả việc người lớn sử dụng sản phẩm thuốc lá hoặc nhắc đến các chất bị kiểm soát sẽ không đủ điều kiện để được đề xuất.","vid_mod_analytics_penalty_reason_stunts_title":"Hành động hoặc môn thể thao nguy hiểm","vid_mod_analytics_penalty_reason_stunts_desc":"Khi được làm theo mà không có khuyến cáo an toàn, một số hoạt động có thể gây rủi ro và nguy hiểm, dẫn đến tổn thương thể chất. Nội dung bao gồm các pha trình diễn nguy hiểm, hoạt động thể thao mạo hiểm do người không chuyên thực hiện, có thể sẽ không đủ điều kiện.","vid_mod_analytics_penalty_reason_graphic_title":"Nội dung bạo lực và phản cảm","vid_mod_analytics_penalty_reason_graphic_desc":"Nội dung khiến người xem khó chịu, sốc hoặc căm phẫn có thể sẽ không đủ điều kiện xuất hiện trên bảng tin Đề xuất, bao gồm hiệu ứng rùng rợn, hù dọa, trang điểm tạo vết thương đẫm máu trông như thật và mô tả các bộ phận chức năng của cơ thể. Hầu hết các nội dung bạo lực và phản cảm đều không được phép đăng lên TikTok. Tuy nhiên, chúng tôi có thể sẽ cho phép đăng một số loại nội dung, chẳng hạn như hình ảnh vẽ lại tình huống tử vong, tai nạn hoặc đánh nhau để làm tư liệu cho sự kiện thật và được xem là được cộng đồng quan tâm. Vì nội dung này có thể sẽ không đem lại cảm giác thoải mái cho tất cả đối tượng khán giả, nên sẽ không đủ điều kiện để được đề xuất, đồng thời nội dung sẽ có cảnh báo hoặc màn hình “chọn xem”.","vid_mod_analytics_penalty_reason_fyf_title":"Không đủ điều kiện xuất hiện trên bảng tin Cho bạn","vid_mod_analytics_penalty_reason_fyf_desc":"Video của bạn không đáp ứng điều kiện để xuất hiện trên bảng tin Cho bạn. Hãy xem lại Nguyên tắc Cộng đồng của TikTok để biết thêm thông tin \u003E Không đủ điều kiện xuất hiện trên bảng tin Cho bạn","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Người dùng và bên thứ ba có thể báo cáo hành vi vi phạm chính sách cho chúng tôi. Chúng tôi đã phát hiện hành vi vi phạm chính sách này dựa trên báo cáo cho rằng nội dung này vi phạm Nguyên tắc Cộng đồng.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Chi tiết video","vid_mod_analytics_appeal_detailpg_reason_title":"Lý do vi phạm","vid_mod_analytics_detail_pg_title":"Video không đủ điều kiện","vid_mod_analytics_detail_pg_desc":"Video này không đủ điều kiện xuất hiện trên bảng tin Cho bạn do vi phạm Nguyên tắc Cộng đồng của chúng tôi.","vidModAnalytics_detailPg_sectionSuccess_header":"Khiếu nại đã được phê duyệt","vid_mod_analytics_appeal_success_detail_pg_desc":"Chúng tôi đã xem xét khiếu nại của bạn và khôi phục video. Chúng tôi xin lỗi vì sự bất tiện này. Cảm ơn bạn vì đã trở thành một thành viên của Cộng đồng TikTok!","vid_mod_analytics_appeal_detail_pg_title":"Video đã bị xóa","vid_mod_analytics_appeal_detail_pg_desc":"Video này vi phạm Nguyên tắc Cộng đồng của chúng tôi.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Đã nhận yêu cầu","vid_mod_analytics_appeal_rcv_detail_pg_desc":"Chúng tôi đã nhận được yêu cầu của bạn và sẽ thông báo cho bạn sau khi có kết quả khiếu nại.","rIC_detailPg_violationReason_title":"Lý do vi phạm","dsaCGWebapp_detailPg_sectionCG_link":"Nguyên tắc Cộng đồng","dsaCGWebapp_appealExpired_emptyState_body":"Bạn không thể khiếu nại quyết định này nữa vì đã hết hạn khiếu nại.","appeal_btn_new":"Khiếu nại","reasonForAppeal_appealPg_appealReasonCard_title":"Lý do khiếu nại quyết định này","oSA_appealPg_appealExplain_title":"Giải thích về khiếu nại","rIC_appealPg_appealExplain_title":"Giải thích về khiếu nại","oSA_appealPg_appealExplain_desc":"Hãy cung cấp thông tin chi tiết nhất có thể về lý do bạn không đồng ý với quyết định này để cho phép chúng tôi đánh giá đúng khiếu nại của bạn.","rIC_appealPg_appealExplain_desc":"Hãy cung cấp thông tin chi tiết nhất có thể về lý do bạn không đồng ý với quyết định hạn chế này để chúng tôi đánh giá đúng khiếu nại của bạn.","dsa_illegal_uploader_vio_appeal_exp_desc":"Vui lòng cung cấp chi tiết nhất có thể về lý do bạn không đồng ý với việc hạn chế này để chúng tôi có thể đánh giá đúng khiếu nại của bạn.","about_this_ad_title":"Giới thiệu về quảng cáo này","pcWeb_autoScroll":"Cuộn tự động","resolutionUpgrade_player_qualityMenuItem_label":"Chất lượng","resolutionUpgrade_player_qualityMenuItem_selection1":"Tự động","syntheticMedia_feed_bottomBanner_AIGCLabel":"Nhà sáng tạo đã gắn nhãn do AI tạo","aigcInfoPanel_feed_label":"Có chứa nội dung do AI tạo","common_registration_email_input_error":"Nhập địa chỉ email hợp lệ","common_registration_username_error_format":"Chỉ cho phép chữ cái, chữ số, dấu gạch dưới hoặc dấu chấm","common_registration_username_error_short":"Tên người dùng phải gồm ít nhất 2 ký tự","common_registration_username_error_long":"Tên người dùng của bạn có thể có tối đa 24 ký tự","common_registration_username_error_period":"Tên người dùng không thể kết thúc bằng dấu chấm","common_registration_username_error_number":"Tên người dùng không thể chỉ bao gồm các chữ số","common_registration_u
